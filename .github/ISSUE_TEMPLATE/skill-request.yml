name: Skill request
description: Propose a new skill or a change to an existing one.
labels: ["skill-request"]
body:
  - type: input
    id: skill-name
    attributes:
      label: Skill name
      description: Lowercase, hyphenated (e.g. animate-transitions).
      placeholder: your-skill-name
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: When should the agent load this skill?
      description: Write a "Use when..." sentence describing the triggering conditions. Not a summary of what the skill does.
      placeholder: Use when the user asks for ...
    validations:
      required: true
  - type: textarea
    id: why-not-existing
    attributes:
      label: Why doesn't an existing skill cover this?
      description: Check the existing skills in the README. Explain why none of them fit.
    validations:
      required: true
  - type: textarea
    id: rules
    attributes:
      label: Concrete rules the skill would enforce
      description: What forbidden patterns, required constants, or specific behaviors would the body contain?
    validations:
      required: true
